name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: ./build.sh

      - name: Verify app bundle
        run: |
          codesign --verify --deep --strict --verbose=2 "TimestampInserter/Build/Timestamp Inserter.app"
          plutil -lint "TimestampInserter/Build/Timestamp Inserter.app/Contents/Info.plist"

      - name: Package artifact
        run: ./scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Timestamp-Inserter
          path: dist/Timestamp-Inserter.zip

      - name: Publish latest app release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: app
          RELEASE_TITLE: Latest app build
          RELEASE_ASSET: dist/Timestamp-Inserter.zip
        run: |
          notes_file="$RUNNER_TEMP/latest-app-release-notes.md"
          {
            echo "Automated app build from main."
            echo
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > "$notes_file"

          git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --latest
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET#Timestamp Inserter.app.zip" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET#Timestamp Inserter.app.zip" \
              --verify-tag \
              --title "$RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --latest
          fi

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --verify-tag \
              --title "Release $tag" \
              --generate-notes
          fi

          gh release upload "$tag" "dist/Timestamp-Inserter.zip#Timestamp Inserter.app.zip" --clobber
