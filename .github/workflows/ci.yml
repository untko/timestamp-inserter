name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: ./build.sh

      - name: Verify app bundle
        run: |
          codesign --verify --deep --strict --verbose=2 "TimestampInserter/Build/Timestamp Inserter.app"
          plutil -lint "TimestampInserter/Build/Timestamp Inserter.app/Contents/Info.plist"

      - name: Package artifact
        run: ./scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Timestamp-Inserter
          path: dist/Timestamp-Inserter.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to create the release first (fails if it already exists)
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes || true

          # Upload the compiled zip to the release
          gh release upload "${{ github.ref_name }}" dist/Timestamp-Inserter.zip --clobber
